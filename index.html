document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n          <div onclick=\"{{ s.go }}\" style=\"display:flex;align-items:center;gap:9px;cursor:pointer;flex-shrink:0;padding:4px 4px;\">\n            <div style=\"{{ s.dotStyle }}\">{{ s.num }}<\u002Fdiv>\n            <div style=\"{{ s.labelStyle }}\">{{ s.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;\">\n        <div style=\"text-align:right;line-height:1.15;\">\n          <div style=\"font-size:.82rem;font-weight:500;color:var(--cocoa);\">{{ aliasDisplay }}<\u002Fdiv>\n          <div style=\"font-size:.66rem;color:rgba(16,15,13,.45);display:flex;align-items:center;gap:6px;justify-content:flex-end;\"><span style=\"{{ autoDotStyle }}\"><\u002Fspan>{{ autoStatusLine }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ logout }}\" title=\"Salir\" style=\"background:none;border:1px solid var(--line);color:var(--cocoa);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:.9rem;\">⏻<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;width:100%;max-width:1080px;margin:0 auto;padding:40px 26px 90px;\">\n\n      <!-- STEP 0 — Bienvenida -->\n      <sc-if value=\"{{ sBienvenida }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"animation:hfFade .5s ease;\">\n        <div style=\"background:var(--ink);border-radius:24px;padding:54px 46px;position:relative;overflow:hidden;\">\n          <div style=\"position:absolute;top:-90px;right:-60px;opacity:.5;\">\n            <svg width=\"260\" height=\"150\" viewBox=\"0 0 260 150\" fill=\"none\"><path d=\"M14 142 A116 116 0 0 1 246 142\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".35\"><\u002Fpath><path d=\"M48 142 A82 82 0 0 1 212 142\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".5\"><\u002Fpath><path d=\"M82 142 A48 48 0 0 1 178 142\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".7\"><\u002Fpath><path d=\"M112 142 A18 18 0 0 1 148 142\" stroke=\"#8e441f\" stroke-width=\"1.4\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"position:relative;max-width:620px;\">\n            <div style=\"display:inline-block;font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;background:#8e441f;color:#faf6f5;font-weight:600;padding:5px 11px;border-radius:6px;margin-bottom:18px;\">{{ welcomeEyebrow }}<\u002Fdiv>\n            <h1 style=\"font-family:'Marcellus',serif;color:var(--paper);font-size:clamp(2.1rem,4.4vw,3.1rem);line-height:1.12;margin:0 0 8px;font-weight:400;\">{{ greeting }}<\u002Fh1>\n            <p style=\"color:rgba(223,211,189,.78);font-size:1.04rem;font-weight:300;line-height:1.62;margin:18px 0 0;\">Tienes ideas, metas y ganas — pero todo vive en tu cabeza y nada termina de avanzar. Aquí paras de dar vueltas: reúnes tus pilares de esencia y tus metas en un solo lugar y eliges tu <b style=\"color:var(--sand);font-weight:500;\">20%<\u002Fb>, lo que de verdad mueve tu vida. Tu 20% no es hacer menos: es a lo que le pones <b style=\"color:var(--sand);font-weight:500;\">enfoque pleno y acción<\u002Fb>. Ahí empieza tu entrenamiento — y es lo que crea el <b style=\"color:var(--sand);font-weight:500;\">80% de tu transformación<\u002Fb>. Deja de ver y empieza a accionar.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin:22px 0;\">\n          <div style=\"background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;\">\n            <div style=\"font-family:'Marcellus',serif;font-size:1.5rem;color:var(--terra);\">01<\u002Fdiv>\n            <div style=\"font-weight:500;margin:6px 0 4px;font-size:.96rem;\">Vacía tu mente<\u002Fdiv>\n            <div style=\"font-size:.86rem;color:rgba(16,15,13,.55);font-weight:300;line-height:1.5;\">Saca de tu cabeza todo lo que traes; el filtro 80/20 revela lo que de verdad importa.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;\">\n            <div style=\"font-family:'Marcellus',serif;font-size:1.5rem;color:var(--terra);\">02<\u002Fdiv>\n            <div style=\"font-weight:500;margin:6px 0 4px;font-size:.96rem;\">Define tu porqué<\u002Fdiv>\n            <div style=\"font-size:.86rem;color:rgba(16,15,13,.55);font-weight:300;line-height:1.5;\">Audita cada acción clave: dónde estás, a dónde vas y qué te sostiene.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;\">\n            <div style=\"font-family:'Marcellus',serif;font-size:1.5rem;color:var(--terra);\">03<\u002Fdiv>\n            <div style=\"font-weight:500;margin:6px 0 4px;font-size:.96rem;\">Acciona 12 semanas<\u002Fdiv>\n            <div style=\"font-size:.86rem;color:rgba(16,15,13,.55);font-weight:300;line-height:1.5;\">Cada semana, un recordatorio con acción y motivación llega solo a tu celular.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px;display:grid;grid-template-columns:1fr 1fr;gap:20px;\">\n          <div>\n            <label style=\"display:block;font-size:.78rem;color:var(--cocoa);font-weight:500;margin-bottom:8px;\">¿Cómo quieres que te llamemos?<\u002Flabel>\n            <input type=\"text\" placeholder=\"Tu nombre o alias\" value=\"{{ alias }}\" onchange=\"{{ onAlias }}\" style=\"width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:11px;font-size:.95rem;background:var(--paper);outline:none;\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:.78rem;color:var(--cocoa);font-weight:500;margin-bottom:8px;\">Fecha de inicio del trimestre<\u002Flabel>\n            <input type=\"date\" value=\"{{ fechaInicio }}\" onchange=\"{{ onFecha }}\" style=\"width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:11px;font-size:.95rem;background:var(--paper);outline:none;color:var(--ink);\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:flex-end;margin-top:30px;\">\n          <button onclick=\"{{ goNext }}\" style=\"padding:15px 32px;border:none;border-radius:12px;background:var(--terra);color:var(--paper);font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;\" style-hover=\"filter:brightness(1.06);\">Comenzar <span style=\"font-size:1.1rem;\">→<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 1 — Pilares -->\n      <sc-if value=\"{{ sPilares }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:hfFade .5s ease;\">\n        <div style=\"margin-bottom:30px;\">\n          <div style=\"display:inline-block;background:#8e441f;color:#faf6f5;font-family:'Marcellus',serif;font-size:clamp(1.7rem,3.4vw,2.4rem);padding:6px 18px;border-radius:6px;line-height:1.2;\">Tus pilares<\u002Fdiv>\n          <p style=\"color:rgba(16,15,13,.6);font-size:1rem;font-weight:300;line-height:1.6;max-width:670px;margin:18px 0 0;\">Tus pilares son las <b style=\"font-weight:500;color:var(--cocoa);\">facetas de una misma persona: tú<\u002Fb>. No eres uno en el trabajo y otro en casa — eres un solo ser con varios frentes donde vive tu energía. Aquí es donde <b style=\"font-weight:500;color:var(--cocoa);\">convergen y se unen<\u002Fb>, en un mismo lugar. Elige entre <b style=\"font-weight:500;color:var(--cocoa);\">3 y 5<\u002Fb>. Por ejemplo: Personal, Familia, Trabajo, tu Emprendimiento.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-bottom:22px;\">\n          <sc-for list=\"{{ pillars }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:11px 13px;box-shadow:0 6px 16px rgba(104,48,30,.04);\">\n              <span style=\"width:9px;height:9px;background:var(--terra);transform:rotate(45deg);flex-shrink:0;\"><\u002Fspan>\n              <input type=\"text\" value=\"{{ p.name }}\" onchange=\"{{ p.rename }}\" style=\"border:none;background:transparent;font-weight:500;font-size:.95rem;color:var(--ink);outline:none;width:130px;\">\n              <button onclick=\"{{ p.remove }}\" disabled=\"{{ p.locked }}\" title=\"Quitar\" style=\"{{ p.delStyle }}\">×<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ canAddPillar }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;gap:10px;max-width:460px;\">\n          <input ref=\"{{ newPillarRef }}\" type=\"text\" placeholder=\"Nombre de un nuevo pilar…\" onkeydown=\"{{ onPillarKey }}\" style=\"flex:1;padding:13px 14px;border:1px solid var(--line);border-radius:11px;font-size:.95rem;background:#fff;outline:none;\">\n          <button onclick=\"{{ addPillar }}\" style=\"padding:0 22px;border:1px solid var(--terra);border-radius:11px;background:transparent;color:var(--terra);font-weight:600;cursor:pointer;\">Añadir<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isDemo }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:6px;padding:18px;background:#fbf8f4;border:1px dashed var(--line);border-radius:14px;\">\n          <div style=\"font-size:.82rem;color:var(--cocoa);font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:8px;\"><span>🔒<\u002Fspan> En la versión completa desbloqueas todos tus pilares<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:9px;\">\n            <sc-for list=\"{{ demoLockedPillars }}\" as=\"lp\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px;opacity:.6;\">\n                <span style=\"font-size:.8rem;\">🔒<\u002Fspan>\n                <span style=\"font-weight:500;font-size:.9rem;color:rgba(16,15,13,.5);\">{{ lp }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:38px;\">\n          <button onclick=\"{{ goBack }}\" style=\"padding:14px 22px;border:1px solid var(--line);border-radius:12px;background:transparent;color:var(--cocoa);font-weight:500;cursor:pointer;\">← Atrás<\u002Fbutton>\n          <button onclick=\"{{ goNext }}\" style=\"padding:15px 32px;border:none;border-radius:12px;background:var(--terra);color:var(--paper);font-size:1rem;font-weight:600;cursor:pointer;\" style-hover=\"filter:brightness(1.06);\">Continuar →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 2 — Volcado -->\n      <sc-if value=\"{{ sVolcado }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:hfFade .5s ease;\">\n        <div style=\"margin-bottom:26px;\">\n          <div style=\"display:inline-block;background:#8e441f;color:#faf6f5;font-family:'Marcellus',serif;font-size:clamp(1.7rem,3.4vw,2.4rem);padding:6px 18px;border-radius:6px;line-height:1.2;\">Suelta tus ideas<\u002Fdiv>\n          <p style=\"color:rgba(16,15,13,.6);font-size:1rem;font-weight:300;line-height:1.6;max-width:670px;margin:18px 0 0;\">Este es tu espacio para plasmarlo <b style=\"font-weight:500;color:var(--cocoa);\">todo, sin juzgar ni ordenar<\u002Fb>: ideas de negocio, ideas personales, metas y sueños. Y lo más importante — piensa en <b style=\"font-weight:500;color:var(--cocoa);\">qué te haría más feliz cuando lo logres<\u002Fb>. Solo suéltalo aquí; priorizas en el siguiente paso. (Hasta 10 por pilar.)<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:24px;box-shadow:0 8px 22px rgba(104,48,30,.05);\">\n          <label style=\"display:block;font-size:.82rem;color:var(--cocoa);font-weight:600;margin-bottom:8px;\"><span style=\"color:var(--terra);\">1 ·<\u002Fspan> Escribe tu idea, meta o sueño<\u002Flabel>\n          <input ref=\"{{ taskNameRef }}\" type=\"text\" placeholder=\"Una idea, meta o sueño que traes…\" onkeydown=\"{{ onTaskKey }}\" style=\"width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:11px;font-size:.95rem;background:var(--paper);outline:none;\">\n          <label style=\"display:block;font-size:.82rem;color:var(--cocoa);font-weight:600;margin:16px 0 9px;\"><span style=\"color:var(--terra);\">2 ·<\u002Fspan> ¿A qué pilar pertenece? <span style=\"font-weight:400;color:rgba(16,15,13,.45);\">Toca uno<\u002Fspan><\u002Flabel>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;\">\n            <sc-for list=\"{{ pillarChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <sc-if value=\"{{ c.active }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ c.choose }}\" style=\"padding:9px 16px;border-radius:10px;font-weight:600;font-size:.88rem;cursor:pointer;border:1px solid var(--terra);background:var(--terra);color:var(--paper);box-shadow:0 4px 12px rgba(142,68,31,.25);\">✓ {{ c.name }}<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ c.inactive }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ c.choose }}\" style=\"padding:9px 16px;border-radius:10px;font-weight:600;font-size:.88rem;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--cocoa);\">{{ c.name }}<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ addTask }}\" style=\"width:100%;padding:14px;border:none;border-radius:11px;background:var(--cocoa);color:var(--paper);font-weight:600;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;\" style-hover=\"filter:brightness(1.1);\">{{ addLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;\">\n          <sc-for list=\"{{ pillarGroups }}\" as=\"g\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fbf8f4;border:1px solid var(--line);border-radius:16px;padding:16px;\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:12px;\">\n                <div style=\"font-weight:600;font-size:.92rem;color:var(--cocoa);\">{{ g.name }}<\u002Fdiv>\n                <div style=\"font-size:.72rem;color:rgba(16,15,13,.4);\">{{ g.countLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ g.tasks }}\" as=\"t\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;\">\n                  <span style=\"width:6px;height:6px;background:var(--terra);transform:rotate(45deg);flex-shrink:0;\"><\u002Fspan>\n                  <div style=\"flex:1;font-size:.88rem;line-height:1.35;\">{{ t.name }}<\u002Fdiv>\n                  <button onclick=\"{{ t.remove }}\" style=\"background:none;border:none;color:rgba(142,68,31,.5);cursor:pointer;font-size:1rem;line-height:1;\">×<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ g.empty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:.8rem;color:rgba(16,15,13,.3);font-style:italic;padding:6px 2px;\">Vacío por ahora…<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ notice }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:20px;color:#a4321f;font-size:.86rem;font-weight:500;\">✦ {{ notice }}<\u002Fdiv><\u002Fsc-if>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:32px;\">\n          <button onclick=\"{{ goBack }}\" style=\"padding:14px 22px;border:1px solid var(--line);border-radius:12px;background:transparent;color:var(--cocoa);font-weight:500;cursor:pointer;\">← Atrás<\u002Fbutton>\n          <button onclick=\"{{ goNext }}\" style=\"padding:15px 32px;border:none;border-radius:12px;background:var(--terra);color:var(--paper);font-size:1rem;font-weight:600;cursor:pointer;\" style-hover=\"filter:brightness(1.06);\">Continuar →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 3 — Prioriza -->\n      <sc-if value=\"{{ sPrioriza }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:hfFade .5s ease;\">\n        <div style=\"margin-bottom:26px;\">\n          <div style=\"display:inline-block;background:#8e441f;color:#faf6f5;font-family:'Marcellus',serif;font-size:clamp(1.7rem,3.4vw,2.4rem);padding:6px 18px;border-radius:6px;line-height:1.2;\">Ordena lo que te hará feliz<\u002Fdiv>\n          <p style=\"color:rgba(16,15,13,.6);font-size:1rem;font-weight:300;line-height:1.6;max-width:680px;margin:18px 0 0;\">Aquí no ordenas por resultado ni para impresionar a nadie. Ordena por lo que te haría <b style=\"font-weight:500;color:var(--cocoa);\">más feliz<\u002Fb>, lo que <b style=\"font-weight:500;color:var(--cocoa);\">disfrutarías hacer<\u002Fb>, el proceso que te llama a transitar. Puntúa del <b style=\"font-weight:500;color:var(--cocoa);\">1 al 10<\u002Fb> — siendo <b style=\"font-weight:500;color:var(--cocoa);\">1 lo más importante<\u002Fb> para ti. El filtro conservará tu 20% vital.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;\">\n          <sc-for list=\"{{ pillarGroups }}\" as=\"g\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fbf8f4;border:1px solid var(--line);border-radius:16px;padding:16px;\">\n              <div style=\"font-weight:600;font-size:.92rem;color:var(--cocoa);border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:12px;\">{{ g.name }}<\u002Fdiv>\n              <sc-for list=\"{{ g.tasks }}\" as=\"t\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;\">\n                  <input type=\"number\" min=\"1\" max=\"10\" placeholder=\"–\" value=\"{{ t.priority }}\" onchange=\"{{ t.setPrio }}\" style=\"width:46px;padding:7px;text-align:center;border:1px solid var(--line);border-radius:8px;font-weight:600;font-size:.9rem;color:var(--terra);background:var(--paper);outline:none;\">\n                  <div style=\"flex:1;font-size:.88rem;line-height:1.35;\">{{ t.name }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ g.empty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:.8rem;color:rgba(16,15,13,.3);font-style:italic;\">Sin actividades.<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ notice }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:20px;color:#a4321f;font-size:.86rem;font-weight:500;\">✦ {{ notice }}<\u002Fdiv><\u002Fsc-if>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:32px;\">\n          <button onclick=\"{{ goBack }}\" style=\"padding:14px 22px;border:1px solid var(--line);border-radius:12px;background:transparent;color:var(--cocoa);font-weight:500;cursor:pointer;\">← Atrás<\u002Fbutton>\n          <button onclick=\"{{ goNext }}\" style=\"padding:15px 32px;border:none;border-radius:12px;background:var(--terra);color:var(--paper);font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;\" style-hover=\"filter:brightness(1.06);\">Ejecutar filtro 80/20 <span>✦<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 4 — Tu 20% -->\n      <sc-if value=\"{{ sFoco }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:hfFade .5s ease;\">\n        <div style=\"margin-bottom:8px;\">\n          <div style=\"display:inline-block;font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;background:#8e441f;color:#faf6f5;font-weight:600;padding:5px 11px;border-radius:6px;margin-bottom:14px;\">Filtro completado · {{ criticalCount }} acciones maestras<\u002Fdiv>\n          <div style=\"display:inline-block;background:#8e441f;color:#faf6f5;font-family:'Marcellus',serif;font-size:clamp(1.7rem,3.4vw,2.4rem);padding:6px 18px;border-radius:6px;line-height:1.2;\">Tu 20% de foco<\u002Fdiv>\n          <p style=\"color:rgba(16,15,13,.6);font-size:1rem;font-weight:300;line-height:1.6;max-width:640px;margin:18px 0 0;\">Este es tu 20%: tus acciones de alto impacto. Define el contexto de cada una — es tu <b style=\"font-weight:500;color:var(--cocoa);\">porqué<\u002Fb>, lo que te va a sostener las 12 semanas.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:26px;\">\n          <sc-for list=\"{{ criticalCards }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border:1px solid var(--line);border-left:5px solid var(--terra);border-radius:14px;padding:22px 22px 8px;margin-bottom:18px;box-shadow:0 10px 26px rgba(104,48,30,.05);\">\n              <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:16px;flex-wrap:wrap;\">\n                <span style=\"font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--paper);background:var(--terra);padding:4px 9px;border-radius:5px;font-weight:600;\">{{ c.pillar }}<\u002Fspan>\n                <span style=\"font-family:'Marcellus',serif;font-size:1.3rem;color:var(--ink);line-height:1.2;\">{{ c.name }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ c.editable }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n                <div><label style=\"display:block;font-size:.76rem;color:var(--cocoa);font-weight:500;margin-bottom:5px;\">Situación actual<\u002Flabel><textarea rows=\"2\" placeholder=\"¿Dónde estás hoy?\" value=\"{{ c.actual }}\" onchange=\"{{ c.onActual }}\" style=\"width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:.86rem;background:var(--paper);outline:none;\"><\u002Ftextarea><\u002Fdiv>\n                <div><label style=\"display:block;font-size:.76rem;color:var(--cocoa);font-weight:500;margin-bottom:5px;\">Situación deseada<\u002Flabel><textarea rows=\"2\" placeholder=\"¿A dónde quieres llegar?\" value=\"{{ c.deseada }}\" onchange=\"{{ c.onDeseada }}\" style=\"width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:.86rem;background:var(--paper);outline:none;\"><\u002Ftextarea><\u002Fdiv>\n                <div><label style=\"display:block;font-size:.76rem;color:var(--cocoa);font-weight:500;margin-bottom:5px;\">Recursos activos<\u002Flabel><input type=\"text\" placeholder=\"Tiempo, experiencia, dinero…\" value=\"{{ c.recursos }}\" onchange=\"{{ c.onRecursos }}\" style=\"width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:.86rem;background:var(--paper);outline:none;\"><\u002Fdiv>\n                <div><label style=\"display:block;font-size:.76rem;color:var(--cocoa);font-weight:500;margin-bottom:5px;\">¿Quién puede ayudarte?<\u002Flabel><input type=\"text\" placeholder=\"Contactos, mentores, equipo…\" value=\"{{ c.ayuda }}\" onchange=\"{{ c.onAyuda }}\" style=\"width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:.86rem;background:var(--paper);outline:none;\"><\u002Fdiv>\n                <div style=\"grid-column:1 / -1;\"><label style=\"display:block;font-size:.76rem;color:var(--cocoa);font-weight:500;margin-bottom:5px;\">Limitaciones reales<\u002Flabel><input type=\"text\" placeholder=\"Miedos, excusas o barreras…\" value=\"{{ c.limitaciones }}\" onchange=\"{{ c.onLimit }}\" style=\"width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:.86rem;background:var(--paper);outline:none;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ c.locked }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;align-items:center;gap:14px;background:#fbf8f4;border:1px dashed var(--line);border-radius:12px;padding:18px;flex-wrap:wrap;\">\n                <span style=\"font-size:1.4rem;\">🔒<\u002Fspan>\n                <div style=\"flex:1;min-width:180px;\">\n                  <div style=\"font-weight:600;font-size:.95rem;color:var(--cocoa);margin-bottom:3px;\">Disponible en la versión completa<\u002Fdiv>\n                  <div style=\"font-size:.85rem;color:rgba(16,15,13,.55);font-weight:300;line-height:1.5;\">Define el contexto de TODAS tus acciones maestras y sostén tu 20% las 12 semanas.<\u002Fdiv>\n                <\u002Fdiv>\n                <a href=\"{{ purchaseLink }}\" target=\"_blank\" rel=\"noopener\" style=\"background:var(--terra);color:var(--paper);padding:11px 18px;border-radius:10px;font-size:.85rem;font-weight:600;text-decoration:none;white-space:nowrap;\">Desbloquear<\u002Fa>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"height:14px;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;margin-top:24px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;box-shadow:0 10px 26px rgba(104,48,30,.05);\">\n          <div style=\"fle
