none;border-radius:12px;background:var(--terra);color:var(--paper);font-size:1rem;font-weight:600;cursor:pointer;\" style-hover=\"filter:brightness(1.06);\">Ir al calendario →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- DEMO paywall · Calendario -->\n      <sc-if value=\"{{ demoPaywallCal }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:hfFade .5s ease;\">\n        <div style=\"background:var(--ink);border-radius:24px;padding:52px 40px;position:relative;overflow:hidden;text-align:center;\">\n          <div style=\"position:absolute;top:-90px;right:-60px;opacity:.45;\"><svg width=\"260\" height=\"150\" viewBox=\"0 0 260 150\" fill=\"none\"><path d=\"M14 142 A116 116 0 0 1 246 142\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".35\"><\u002Fpath><path d=\"M82 142 A48 48 0 0 1 178 142\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".7\"><\u002Fpath><path d=\"M112 142 A18 18 0 0 1 148 142\" stroke=\"#8e441f\" stroke-width=\"1.4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"position:relative;max-width:540px;margin:0 auto;\">\n            <div style=\"font-size:2.2rem;margin-bottom:12px;\">🔒<\u002Fdiv>\n            <div style=\"display:inline-block;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;background:#8e441f;color:#faf6f5;font-weight:600;padding:5px 12px;border-radius:6px;margin-bottom:16px;\">Versión completa<\u002Fdiv>\n            <h2 style=\"font-family:'Marcellus',serif;color:var(--paper);font-size:clamp(1.7rem,3.6vw,2.3rem);font-weight:400;line-height:1.15;margin:0 0 14px;\">Tu calendario de 12 semanas<\u002Fh2>\n            <p style=\"color:rgba(223,211,189,.78);font-size:1rem;font-weight:300;line-height:1.65;margin:0 0 22px;\">Planifica tus 3 primeras semanas, entiende las 4 fases del método y crea tu propio sistema para sostener tu 20%. Esta sección se activa con tu membresía.<\u002Fp>\n            <a href=\"{{ purchaseLink }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:var(--terra);color:var(--paper);padding:15px 30px;border-radius:12px;font-size:1rem;font-weight:600;text-decoration:none;\">Desbloquear · $2.99/mes<\u002Fa>\n            <div style=\"margin-top:20px;\"><a onclick=\"{{ goBack }}\" style=\"cursor:pointer;font-size:.85rem;color:rgba(223,211,189,.6);font-weight:300;text-decoration:none;\">← Volver<\u002Fa><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- DEMO paywall · Mi avance -->\n      <sc-if value=\"{{ demoPaywallAv }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:hfFade .5s ease;\">\n        <div style=\"background:var(--ink);border-radius:24px;padding:52px 40px;position:relative;overflow:hidden;text-align:center;\">\n          <div style=\"position:absolute;top:-90px;right:-60px;opacity:.45;\"><svg width=\"260\" height=\"150\" viewBox=\"0 0 260 150\" fill=\"none\"><path d=\"M14 142 A116 116 0 0 1 246 142\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".35\"><\u002Fpath><path d=\"M82 142 A48 48 0 0 1 178 142\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".7\"><\u002Fpath><path d=\"M112 142 A18 18 0 0 1 148 142\" stroke=\"#8e441f\" stroke-width=\"1.4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"position:relative;max-width:540px;margin:0 auto;\">\n            <div style=\"font-size:2.2rem;margin-bottom:12px;\">🔒<\u002Fdiv>\n            <div style=\"display:inline-block;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;background:#8e441f;color:#faf6f5;font-weight:600;padding:5px 12px;border-radius:6px;margin-bottom:16px;\">Versión completa<\u002Fdiv>\n            <h2 style=\"font-family:'Marcellus',serif;color:var(--paper);font-size:clamp(1.7rem,3.6vw,2.3rem);font-weight:400;line-height:1.15;margin:0 0 14px;\">Tu bitácora semanal<\u002Fh2>\n            <p style=\"color:rgba(223,211,189,.78);font-size:1rem;font-weight:300;line-height:1.65;margin:0 0 22px;\">Registra cada semana, recibe tus recordatorios con acción y motivación, y mira tu evolución con recaps mensuales. Esta sección se activa con tu membresía.<\u002Fp>\n            <a href=\"{{ purchaseLink }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:var(--terra);color:var(--paper);padding:15px 30px;border-radius:12px;font-size:1rem;font-weight:600;text-decoration:none;\">Desbloquear · $2.99/mes<\u002Fa>\n            <div style=\"margin-top:20px;\"><a onclick=\"{{ goBack }}\" style=\"cursor:pointer;font-size:.85rem;color:rgba(223,211,189,.6);font-weight:300;text-decoration:none;\">← Volver<\u002Fa><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 5 — Calendario -->\n      <sc-if value=\"{{ sCalendario }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:hfFade .5s ease;\">\n        <div style=\"margin-bottom:26px;\">\n          <div style=\"display:inline-block;background:#8e441f;color:#faf6f5;font-family:'Marcellus',serif;font-size:clamp(1.7rem,3.4vw,2.4rem);padding:6px 18px;border-radius:6px;line-height:1.2;\">Tu calendario de enfoque<\u002Fdiv>\n          <p style=\"color:rgba(16,15,13,.6);font-size:1rem;font-weight:300;line-height:1.6;max-width:680px;margin:18px 0 0;\">No planees las 12 semanas de golpe. Aquí entiendes las <b style=\"font-weight:500;color:var(--cocoa);\">fases<\u002Fb> que vas a recorrer y armas tu plan de las <b style=\"font-weight:500;color:var(--cocoa);\">3 primeras semanas<\u002Fb>: una en presente y dos preparadas. Ten claro el resultado que quieres — el sistema se va adaptando a ti.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:22px;\">\n          <div style=\"font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:var(--cocoa);font-weight:600;margin-bottom:14px;\">Estilo de tus mensajes<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;\">\n            <sc-for list=\"{{ packOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ o.select }}\" style=\"{{ o.cardStyle }}\">\n                <div style=\"{{ o.titleStyle }}\">{{ o.label }}<\u002Fdiv>\n                <div style=\"{{ o.descStyle }}\">{{ o.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:18px;\">\n            <label style=\"font-size:.82rem;color:var(--cocoa);font-weight:500;\">Hora del recordatorio<\u002Flabel>\n            <select onchange=\"{{ onHora }}\" style=\"padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-size:.92rem;background:var(--paper);outline:none;color:var(--ink);\">\n              <sc-for list=\"{{ horaOptions }}\" as=\"h\" hint-placeholder-count=\"5\"><option value=\"{{ h.value }}\" selected=\"{{ h.sel }}\">{{ h.label }}<\u002Foption><\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Guía de proceso -->\n        <div style=\"background:var(--ink);border-radius:18px;padding:26px 28px;margin-bottom:20px;position:relative;overflow:hidden;\">\n          <div style=\"position:absolute;top:-40px;right:-30px;opacity:.4;\"><svg width=\"160\" height=\"100\" viewBox=\"0 0 160 100\" fill=\"none\"><path d=\"M10 92 A70 70 0 0 1 150 92\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".4\"><\u002Fpath><path d=\"M44 92 A36 36 0 0 1 116 92\" stroke=\"#8e441f\" stroke-width=\"1.3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"position:relative;\">\n            <div style=\"display:inline-block;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;background:#8e441f;color:#faf6f5;font-weight:600;padding:5px 11px;border-radius:6px;margin-bottom:14px;\">Es un proceso, no un resultado<\u002Fdiv>\n            <p style=\"color:rgba(223,211,189,.82);font-size:.98rem;font-weight:300;line-height:1.62;margin:0;max-width:700px;\">Estas 12 semanas son para <b style=\"color:var(--sand);font-weight:500;\">actuar, observar y reajustar<\u002Fb>. Iterar, evaluar, medir y volver a empezar no significa que algo va mal: <b style=\"color:var(--sand);font-weight:500;\">es el camino<\u002Fb>. No persigues un resultado final, internalizas una forma de avanzar. Tu <b style=\"color:var(--sand);font-weight:500;\">Fase 0 (Introspección)<\u002Fb> ya la recorriste al definir tus pilares y tu 20%.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Las 4 fases · la base de tu sistema -->\n        <div style=\"margin-bottom:6px;\">\n          <div style=\"display:inline-block;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;background:#8e441f;color:#faf6f5;font-weight:600;padding:5px 11px;border-radius:6px;margin-bottom:12px;\">Las 4 fases de tu sistema<\u002Fdiv>\n          <p style=\"color:rgba(16,15,13,.6);font-size:.98rem;font-weight:300;line-height:1.6;max-width:690px;margin:0 0 18px;\">No es una receta rígida. Son la base para que construyas <b style=\"font-weight:500;color:var(--cocoa);\">tu propio sistema<\u002Fb> — uno que se adapta a ti mientras aprendes lo que es crear, sostener y avanzar.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(288px,1fr));gap:16px;margin-bottom:32px;\">\n\n          <div style=\"background:var(--ink);border-radius:18px;padding:24px;position:relative;overflow:hidden;\">\n            <div style=\"position:absolute;top:-30px;right:-24px;opacity:.4;\"><svg width=\"110\" height=\"66\" viewBox=\"0 0 110 66\" fill=\"none\"><path d=\"M6 60 A49 49 0 0 1 104 60\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".4\"><\u002Fpath><path d=\"M28 60 A27 27 0 0 1 82 60\" stroke=\"#8e441f\" stroke-width=\"1.3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"position:relative;\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:13px;\"><span style=\"width:40px;height:40px;border-radius:12px;background:rgba(142,68,31,.25);border:1px solid var(--terra);display:flex;align-items:center;justify-content:center;font-family:'Marcellus',serif;font-size:1.25rem;color:var(--sand);flex-shrink:0;\">0<\u002Fspan><div><div style=\"font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--terra);font-weight:600;\">Ya la recorriste<\u002Fdiv><div style=\"font-family:'Marcellus',serif;font-size:1.32rem;color:var(--paper);line-height:1.1;\">Introspección<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <p style=\"font-size:.9rem;color:rgba(223,211,189,.82);font-weight:300;line-height:1.55;margin:0 0 13px;\">Definiste tus pilares, soltaste tus ideas y filtraste tu 20%. Ya sabes qué te haría más feliz lograr.<\u002Fp>\n              <div style=\"background:rgba(223,211,189,.07);border-radius:11px;padding:12px 14px;font-size:.82rem;color:rgba(223,211,189,.72);font-weight:300;line-height:1.5;\"><b style=\"color:var(--terra);font-weight:600;\">Ejemplo · <\u002Fb>Descubres que tu 20% es \"lanzar mi primer taller online\".<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:var(--ink);border-radius:18px;padding:24px;position:relative;overflow:hidden;\">\n            <div style=\"position:absolute;top:-30px;right:-24px;opacity:.4;\"><svg width=\"110\" height=\"66\" viewBox=\"0 0 110 66\" fill=\"none\"><path d=\"M6 60 A49 49 0 0 1 104 60\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".4\"><\u002Fpath><path d=\"M28 60 A27 27 0 0 1 82 60\" stroke=\"#8e441f\" stroke-width=\"1.3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"position:relative;\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:13px;\"><span style=\"width:40px;height:40px;border-radius:12px;background:var(--terra);display:flex;align-items:center;justify-content:center;font-family:'Marcellus',serif;font-size:1.25rem;color:var(--paper);flex-shrink:0;\">1<\u002Fspan><div><div style=\"font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--terra);font-weight:600;\">Semanas 1–4<\u002Fdiv><div style=\"font-family:'Marcellus',serif;font-size:1.32rem;color:var(--paper);line-height:1.1;\">Acción<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <p style=\"font-size:.9rem;color:rgba(223,211,189,.82);font-weight:300;line-height:1.55;margin:0 0 13px;\">Empiezas a moverte. Bloqueas tiempo real y das el primer paso, aunque sea imperfecto. Dejas de ver y accionas.<\u002Fp>\n              <div style=\"background:rgba(223,211,189,.07);border-radius:11px;padding:12px 14px;font-size:.82rem;color:rgba(223,211,189,.72);font-weight:300;line-height:1.5;\"><b style=\"color:var(--terra);font-weight:600;\">Ejemplo · <\u002Fb>Reservas 1 hora los martes y escribes el guion de tu taller.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:var(--ink);border-radius:18px;padding:24px;position:relative;overflow:hidden;\">\n            <div style=\"position:absolute;top:-30px;right:-24px;opacity:.4;\"><svg width=\"110\" height=\"66\" viewBox=\"0 0 110 66\" fill=\"none\"><path d=\"M6 60 A49 49 0 0 1 104 60\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".4\"><\u002Fpath><path d=\"M28 60 A27 27 0 0 1 82 60\" stroke=\"#8e441f\" stroke-width=\"1.3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"position:relative;\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:13px;\"><span style=\"width:40px;height:40px;border-radius:12px;background:var(--terra);display:flex;align-items:center;justify-content:center;font-family:'Marcellus',serif;font-size:1.25rem;color:var(--paper);flex-shrink:0;\">2<\u002Fspan><div><div style=\"font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--terra);font-weight:600;\">Semanas 5–8<\u002Fdiv><div style=\"font-family:'Marcellus',serif;font-size:1.32rem;color:var(--paper);line-height:1.1;\">Evaluación<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <p style=\"font-size:.9rem;color:rgba(223,211,189,.82);font-weight:300;line-height:1.55;margin:0 0 13px;\">Observas qué funciona y qué no. Iteras, mides y ajustas sin castigarte. Reajustar es parte del camino.<\u002Fp>\n              <div style=\"background:rgba(223,211,189,.07);border-radius:11px;padding:12px 14px;font-size:.82rem;color:rgba(223,211,189,.72);font-weight:300;line-height:1.5;\"><b style=\"color:var(--terra);font-weight:600;\">Ejemplo · <\u002Fb>Notas que rindes mejor temprano y mueves tu bloque a las 7 a.m.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:var(--ink);border-radius:18px;padding:24px;position:relative;overflow:hidden;\">\n            <div style=\"position:absolute;top:-30px;right:-24px;opacity:.4;\"><svg width=\"110\" height=\"66\" viewBox=\"0 0 110 66\" fill=\"none\"><path d=\"M6 60 A49 49 0 0 1 104 60\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".4\"><\u002Fpath><path d=\"M28 60 A27 27 0 0 1 82 60\" stroke=\"#8e441f\" stroke-width=\"1.3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"position:relative;\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:13px;\"><span style=\"width:40px;height:40px;border-radius:12px;background:var(--terra);display:flex;align-items:center;justify-content:center;font-family:'Marcellus',serif;font-size:1.25rem;color:var(--paper);flex-shrink:0;\">3<\u002Fspan><div><div style=\"font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--terra);font-weight:600;\">Semanas 9–12<\u002Fdiv><div style=\"font-family:'Marcellus',serif;font-size:1.32rem;color:var(--paper);line-height:1.1;\">Internalización<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <p style=\"font-size:.9rem;color:rgba(223,211,189,.82);font-weight:300;line-height:1.55;margin:0 0 13px;\">El proceso deja de ser esfuerzo y se vuelve tu forma de avanzar. Ya no lo piensas: es identidad.<\u002Fp>\n              <div style=\"background:rgba(223,211,189,.07);border-radius:11px;padding:12px 14px;font-size:.82rem;color:rgba(223,211,189,.72);font-weight:300;line-height:1.5;\"><b style=\"color:var(--terra);font-weight:600;\">Ejemplo · <\u002Fb>Enfocarte en tu 20% cada semana ya es natural, sin recordártelo.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- Plan de las 3 primeras semanas -->\n        <div style=\"background:#fbf8f4;border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:22px;\">\n          <div style=\"display:inline-block;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;background:#8e441f;color:#faf6f5;font-weight:600;padding:5px 11px;border-radius:6px;margin-bottom:12px;\">Arma tu plan · 3 primeras semanas<\u002Fdiv>\n          <p style=\"color:rgba(16,15,13,.6);font-size:.96rem;font-weight:300;line-height:1.6;max-width:690px;margin:0 0 20px;\">Una semana en <b style=\"font-weight:500;color:var(--cocoa);\">presente<\u002Fb> y dos <b style=\"font-weight:500;color:var(--cocoa);\">preparadas<\u002Fb>. No cargues las 12 de una vez — avanza de a tres pasos, con el resultado que quieres siempre claro en tu mente.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(244px,1fr));gap:14px;\">\n            <sc-for list=\"{{ plan3Cards }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 6px 16px rgba(104,48,30,.04);\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:13px;\">\n                  <span style=\"width:32px;height:32px;border-radius:9px;background:var(--terra);color:var(--paper);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.92rem;flex-shrink:0;\">{{ c.n }}<\u002Fspan>\n                  <div><div style=\"font-weight:600;font-size:.88rem;color:var(--cocoa);line-height:1.15;\">{{ c.label }}<\u002Fdiv><div style=\"font-size:.75rem;color:rgba(16,15,13,.45);font-weight:300;\">{{ c.hint }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <label style=\"display:block;font-size:.74rem;color:var(--cocoa);font-weight:500;margin-bottom:5px;\">✦ Tu foco<\u002Flabel>\n                <textarea rows=\"2\" placeholder=\"La acción de tu 20% que vas a mover…\" value=\"{{ c.foco }}\" onchange=\"{{ c.onFoco }}\" style=\"width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:9px;font-size:.86rem;background:var(--paper);outline:none;line-height:1.4;resize:vertical;font-family:'Poppins',sans-serif;\"><\u002Ftextarea>\n                <label style=\"display:block;font-size:.74rem;color:var(--cocoa);font-weight:500;margin:12px 0 5px;\">¿Cuándo lo harás?<\u002Flabel>\n                <input type=\"text\" placeholder=\"Ej. Martes 7 a.m., 1 hora\" value=\"{{ c.cuando }}\" onchange=\"{{ c.onCuando }}\" style=\"width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:9px;font-size:.86rem;background:var(--paper);outline:none;\">\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:16px;\"><span style=\"color:var(--terra);font-size:.9rem;line-height:1.3;flex-shrink:0;\">✦<\u002Fspan><span style=\"font-size:.8rem;color:rgba(16,15,13,.55);font-weight:300;line-height:1.55;\">Se guarda solo. Cuando cierres tu semana 1, prepara la 4: siempre vas una en presente y dos adelante.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Invitación: crea tu propio sistema -->\n        <div style=\"background:var(--ink);border-radius:18px;padding:30px 30px;margin-bottom:22px;position:relative;overflow:hidden;\">\n          <div style=\"position:absolute;top:-64px;right:-48px;opacity:.5;pointer-events:none;\"><svg width=\"240\" height=\"140\" viewBox=\"0 0 240 140\" fill=\"none\"><path d=\"M14 132 A106 106 0 0 1 226 132\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".3\"><\u002Fpath><path d=\"M48 132 A72 72 0 0 1 192 132\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".5\"><\u002Fpath><path d=\"M82 132 A38 38 0 0 1 158 132\" stroke=\"#8e441f\" stroke-width=\"1.4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"position:relative;\">\n            <div style=\"display:inline-block;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--terra);font-weight:600;margin-bottom:12px;\">Tu siguiente paso<\u002Fdiv>\n            <h3 style=\"font-family:'Marcellus',serif;color:var(--paper);font-size:clamp(1.5rem,3.4vw,2.1rem);font-weight:400;line-height:1.12;margin:0 0 14px;\">Ahora diseña <span style=\"color:var(--terra);\">tu<\u002Fspan> propio sistema<\u002Fh3>\n            <p style=\"color:rgba(223,211,189,.82);font-size:1rem;font-weight:300;line-height:1.65;margin:0 0 16px;max-width:680px;\">Ya tienes tus primeras 3 semanas. Con eso arranca lo que de verdad importa: <b style=\"color:var(--sand);font-weight:500;\">crear tu sistema<\u002Fb>. Y un sistema es simple — tiene un <b style=\"color:var(--sand);font-weight:500;\">inicio<\u002Fb> y una <b style=\"color:var(--sand);font-weight:500;\">retroalimentación<\u002Fb>: empiezas, observas qué pasó y ajustas.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:16px;\">\n              <span style=\"font-size:.8rem;color:var(--sand);background:rgba(223,211,189,.08);border:1px solid rgba(223,211,189,.16);border-radius:20px;padding:6px 14px;font-weight:300;\">Una hoja de papel<\u002Fspan>\n              <span style=\"font-size:.8rem;color:var(--sand);background:rgba(223,211,189,.08);border:1px solid rgba(223,211,189,.16);border-radius:20px;padding:6px 14px;font-weight:300;\">Excel<\u002Fspan>\n              <span style=\"font-size:.8rem;color:var(--sand);background:rgba(223,211,189,.08);border:1px solid rgba(223,211,189,.16);border-radius:20px;padding:6px 14px;font-weight:300;\">PowerPoint<\u002Fspan>\n              <span style=\"font-size:.8rem;color:var(--sand);background:rgba(223,211,189,.08);border:1px solid rgba(223,211,189,.16);border-radius:20px;padding:6px 14px;font-weight:300;\">Figma<\u002Fspan>\n              <span style=\"font-size:.8rem;color:var(--sand);background:rgba(223,211,189,.08);border:1px solid rgba(223,211,189,.16);border-radius:20px;padding:6px 14px;font-weight:300;\">La herramienta que resuene contigo<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"color:rgba(223,211,189,.82);font-size:1rem;font-weight:300;line-height:1.65;margin:0 0 18px;max-width:680px;\">Hazlo donde te sientas cómodo. Este es tu momento de <b style=\"color:var(--sand);font-weight:500;\">trabajar y diseñar para ti<\u002Fb>: lo que resuena contigo, tus hábitos, tu realidad, tus gustos.<\u002Fp>\n            <div style=\"background:rgba(142,68,31,.18);border-left:3px solid var(--terra);border-radius:0 12px 12px 0;padding:15px 18px;\">\n              <p style=\"color:var(--paper);font-size:1rem;font-weight:400;line-height:1.55;margin:0;\">Aquí no copias el sistema de nadie. Te acompaño a que crees <b style=\"color:var(--terra);font-weight:600;\">el tuyo<\u002Fb>.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fbf8f4;border:1px solid var(--line);border-radius:16px;padding:24px;margin-top:18px;\">\n          <div style=\"display:flex;gap:9px;align-items:flex-start;margin-bottom:16px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;\">\n            <span style=\"color:#1f7a4d;font-size:.9rem;line-height:1.2;flex-shrink:0;\">✓<\u002Fspan>\n            <span style=\"font-size:.82rem;color:rgba(16,15,13,.6);font-weight:300;line-height:1.5;\">Todo lo que escribes se <b style=\"font-weight:500;color:var(--cocoa);\">guarda solo<\u002Fb> mientras avanzas y te espera la próxima vez que entres. Este botón solo fuerza una sincronización.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n            <button onclick=\"{{ doSave }}\" style=\"flex:1;min-width:220px;padding:16px;border:none;border-radius:12px;background:var(--cocoa);color:var(--paper);font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;\" style-hover=\"filter:brightness(1.08);\">{{ saveLabel }}<\u002Fbutton>\n            <button onclick=\"{{ downloadIcs }}\" style=\"flex:1;min-width:220px;padding:16px;border:none;border-radius:12px;background:var(--terra);color:var(--paper);font-size:1rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;\" style-hover=\"filter:brightness(1.06);\">📅 Descargar calendario (.ics)<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{ saveMsg }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"{{ saveMsgStyle }}\">{{ saveMsg }}<\u002Fdiv><\u002Fsc-if>\n          <p style=\"font-size:.78rem;color:rgba(16,15,13,.45);font-weight:300;line-height:1.55;margin:16px 0 0;\">El archivo .ics se abre en Google Calendar, Apple Calendario o el calendario de tu celular. Cada evento trae una alarma para que el recordatorio te llegue solo.<\u002Fp>\n\n          <div style=\"border-top:1px solid var(--line);margin-top:20px;padding-top:20px;\">\n            <div style=\"display:inline-block;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;background:#8e441f;color:#faf6f5;font-weight:600;padding:5px 11px;border-radius:6px;margin-bottom:16px;\">Cómo pasar tu agenda al calendario<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:16px;\">\n              <div style=\"background:#fff;border:1px solid var(--line);border-radius:13px;padding:18px;\">\n                <div style=\"font-weight:600;font-size:.92rem;color:var(--cocoa);margin-bottom:10px;display:flex;align-items:center;gap:8px;\"><span>📱<\u002Fspan> En tu celular<\u002Fdiv>\n                <ol style=\"margin:0;padding-left:18px;font-size:.85rem;color:rgba(16,15,13,.62);font-weight:300;line-height:1.65;\">\n                  <li>Toca <b style=\"font-weight:600;color:var(--ink);\">Descargar calendario (.ics)<\u002Fb>.<\u002Fli>\n                  <li>Abre el archivo que se descargó.<\u002Fli>\n                  <li>Tu teléfono preguntará en qué calendario agregarlo (Google o Apple). Acepta.<\u002Fli>\n                  <li>Listo: las 12 semanas quedan con alarma automática.<\u002Fli>\n                <\u002Fol>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid var(--line);border-radius:13px;padding:18px;\">\n                <div style=\"font-weight:600;font-size:.92rem;color:var(--cocoa);margin-bottom:10px;display:flex;align-items:center;gap:8px;\"><span>💻<\u002Fspan> En Google Calendar (computador)<\u002Fdiv>\n                <ol style=\"margin:0;padding-left:18px;font-size:.85rem;color:rgba(16,15,13,.62);font-weight:300;line-height:1.65;\">\n                  <li>Descarga el archivo <b style=\"font-weight:600;color:var(--ink);\">.ics<\u002Fb>.<\u002Fli>\n                  <li>Entra a Google Calendar → ⚙️ <b style=\"font-weight:600;color:var(--ink);\">Configuración<\u002Fb>.<\u002Fli>\n                  <li>Abre <b style=\"font-weight:600;color:var(--ink);\">Importar y exportar<\u002Fb>.<\u002Fli>\n                  <li>Elige el archivo .ics y pulsa <b style=\"font-weight:600;color:var(--ink);\">Importar<\u002Fb>.<\u002Fli>\n                <\u002Fol>\n                <a href=\"https://calendar.google.com/calendar/r/settings/export\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-size:.83rem;font-weight:600;color:var(--terra);text-decoration:none;border-bottom:1px solid rgba(142,68,31,.35);\">Abrir Google Calendar →<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ downloadPillars }}\" style=\"width:100%;margin-top:16px;padding:15px;border:1px solid var(--ink);border-radius:12px;background:transparent;color:var(--ink);font-size:.94rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;\" style-hover=\"background:var(--ink);color:var(--paper);\">🖼️ Descargar imagen de mis pilares · 20% en amarillo<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:14px;flex-wrap:wrap;\">\n          <button onclick=\"{{ goBack }}\" style=\"padding:14px 22px;border:1px solid var(--line);border-radius:12px;background:transparent;color:var(--cocoa);font-weight:500;cursor:pointer;\">← Atrás<\u002Fbutton>\n          <button onclick=\"{{ goNext }}\" style=\"padding:15px 30px;border:none;border-radius:12px;background:var(--terra);color:var(--paper);font-size:1rem;font-weight:600;cursor:pointer;\" style-hover=\"filter:brightness(1.06);\">Ir a mi avance →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 6 — Mi avance (seguimiento semanal) -->\n      <sc-if value=\"{{ sAvance }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:hfFade .5s ease;\">\n        <div style=\"margin-bottom:22px;\">\n          <div style=\"display:inline-block;font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;background:#8e441f;color:#faf6f5;font-weight:600;padding:5px 11px;border-radius:6px;margin-bottom:14px;\">Tu bitácora · semana {{ avCurrentNum }} de 12<\u002Fdiv>\n          <div style=\"display:inline-block;background:#8e441f;color:#faf6f5;font-family:'Marcellus',serif;font-size:clamp(1.7rem,3.4vw,2.4rem);padding:6px 18px;border-radius:6px;line-height:1.2;\">Mi avance<\u002Fdiv>\n          <p style=\"color:rgba(16,15,13,.6);font-size:1rem;font-weight:300;line-height:1.6;max-width:660px;margin:18px 0 0;\">Cada semana registras —en pocas líneas— qué hiciste con tu 20%. Corto y honesto. Verás tu camino mes a mes, una semana a la vez, sin agobio.<\u002Fp>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ avNotReady }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px solid var(--line);border-radius:16px;padding:30px;text-align:center;\">\n            <div style=\"font-family:'Marcellus',serif;font-size:1.35rem;color:var(--cocoa);margin-bottom:8px;\">Primero define tu 20%<\u002Fdiv>\n            <p style=\"font-size:.9rem;color:rgba(16,15,13,.55);font-weight:300;line-height:1.6;margin:0 0 18px;\">Completa tus pilares y el filtro 80/20 para empezar a registrar tu avance.<\u002Fp>\n            <button onclick=\"{{ goToStart }}\" style=\"padding:13px 26px;border:none;border-radius:11px;background:var(--terra);color:var(--paper);font-weight:600;cursor:pointer;\">Ir al inicio<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ avReady }}\" hint-placeholder-val=\"{{ true }}\">\n\n          <!-- rail de 12 semanas -->\n          <div style=\"background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 18px 14px;margin-bottom:18px;box-shadow:0 8px 22px rgba(104,48,30,.04);\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:13px;flex-wrap:wrap;gap:8px;\">\n              <div style=\"font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:var(--cocoa);font-weight:600;\">Tu trimestre · 12 semanas<\u002Fdiv>\n              <div style=\"font-size:.74rem;color:rgba(16,15,13,.45);font-weight:400;\">{{ avRegisteredLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"hfscroll\" style=\"display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;\">\n              <sc-for list=\"{{ weekRail }}\" as=\"w\" hint-placeholder-count=\"12\">\n                <button onclick=\"{{ w.go }}\" title=\"Semana {{ w.num }}\" style=\"{{ w.dotStyle }}\">{{ w.num }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:.72rem;color:rgba(16,15,13,.5);font-weight:300;\">\n              <span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:11px;height:11px;border-radius:4px;background:var(--terra);\"><\u002Fspan>Registrada<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:11px;height:11px;border-radius:4px;background:var(--ink);\"><\u002Fspan>Semana actual<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:11px;height:11px;border-radius:4px;border:1px solid var(--line);\"><\u002Fspan>Por venir<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- banner de hito mensual -->\n          <sc-if value=\"{{ avMilestone }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--ink);border-radius:16px;padding:22px 24px;margin-bottom:18px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;\">\n              <div style=\"position:absolute;top:-34px;right:-26px;opacity:.4;\"><svg width=\"130\" height=\"80\" viewBox=\"0 0 130 80\" fill=\"none\"><path d=\"M8 74 A57 57 0 0 1 122 74\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".4\"><\u002Fpath><path d=\"M36 74 A29 29 0 0 1 94 74\" stroke=\"#8e441f\" stroke-width=\"1.3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"position:relative;max-width:440px;\">\n                <div style=\"font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--terra);font-weight:600;margin-bottom:6px;\">Cerraste un mes ✦<\u002Fdiv>\n                <div style=\"font-family:'Marcellus',serif;color:var(--paper);font-size:1.4rem;line-height:1.2;\">Mira el camino que recorriste<\u002Fdiv>\n                <p style=\"color:rgba(223,211,189,.7);font-size:.86rem;font-weight:300;line-height:1.55;margin:8px 0 0;\">Tu resumen del mes {{ avMilestoneMonth }} ya está listo. Tómate un momento para verlo antes de seguir.<\u002Fp>\n              <\u002Fdiv>\n              <button onclick=\"{{ openMilestone }}\" style=\"position:relative;padding:13px 22px;border:none;border-radius:11px;background:var(--terra);color:var(--paper);font-weight:600;font-size:.92rem;cursor:pointer;white-space:nowrap;\" style-hover=\"filter:brightness(1.06);\">Ver mi resumen →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ====== RECAP / JOURNEY ====== -->\n          <sc-if value=\"{{ avShowRecap }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--ink);border-radius:20px;padding:32px 30px;position:relative;overflow:hidden;animation:hfFade .4s ease;\">\n              <div style=\"position:absolute;top:-70px;right:-50px;opacity:.45;\"><svg width=\"220\" height=\"130\" viewBox=\"0 0 220 130\" fill=\"none\"><path d=\"M12 122 A98 98 0 0 1 208 122\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".3\"><\u002Fpath><path d=\"M46 122 A64 64 0 0 1 174 122\" stroke=\"#dfd3bd\" stroke-width=\"1\" opacity=\".5\"><\u002Fpath><path d=\"M80 122 A30 30 0 0 1 140 122\" stroke=\"#8e441f\" stroke-width=\"1.4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"position:relative;\">\n                <div style=\"font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--terra);font-weight:600;margin-bottom:10px;\">Tu journey · {{ recapRange }}<\u002Fdiv>\n                <h2 style=\"font-family:'Marcellus',serif;color:var(--paper);font-size:clamp(1.7rem,3.6vw,2.5rem);font-weight:400;margin:0 0 6px;line-height:1.1;\">{{ recapTitle }}<\u002Fh2>\n                <div style=\"font-size:.86rem;color:rgba(223,211,189,.6);font-weight:300;margin-bottom:26px;\">{{ recapRegisteredLabel }}<\u002Fdiv>\n\n                <div style=\"display:flex;flex-direction:column;gap:0;margin-bottom:24px;\">\n                  <sc-for list=\"{{ recapWeeks }}\" as=\"r\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex;gap:16px;align-items:stretch;\">\n                      <div style=\"display:flex;flex-direction:column;align-items:center;flex-shrink:0;\">\n                        <div style=\"{{ r.nodeStyle }}\">{{ r.num }}<\u002Fdiv>\n                        <div style=\"flex:1;width:1px;background:rgba(223,211,189,.18);min-height:14px;\"><\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"padding-bottom:20px;flex:1;min-width:0;\">\n                        <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:5px;\">\n                          <span style=\"font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(223,211,189,.55);font-weight:500;\">Sem {{ r.num }} · {{ r.date }}<\u002Fspan>\n                          <sc-if value=\"{{ r.hasAnimo }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:.68rem;color:var(--terra);background:rgba(142,68,31,.2);padding:2px 9px;border-radius:20px;font-weight:500;\">{{ r.animoLabel }}<\u002Fspan><\u002Fsc-if>\n                        <\u002Fdiv>\n                        <sc-if value=\"{{ r.has }}\" hint-placeholder-val=\"{{ true }}\">\n                          <div style=\"font-size:.95rem;color:var(--paper);font-weight:400;line-height:1.45;\">{{ r.snippet }}<\u002Fdiv>\n                          <sc-if value=\"{{ r.hasSeguira }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:.82rem;color:rgba(223,211,189,.62);font-weight:300;font-style:italic;line-height:1.45;margin-top:3px;\">↻ Una vez más: {{ r.seguira }}<\u002Fdiv><\u002Fsc-if>\n                        <\u002Fsc-if>\n                        <sc-if value=\"{{ r.empty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:.86rem;color:rgba(223,211,189,.32);font-weight:300;font-style:italic;\">Sin registro esta semana.<\u002Fdiv><\u002Fsc-if>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ recapHasUVM }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"background:rgba(223,211,189,.07);border:1px solid rgba(223,211,189,.14);border-radius:14px;padding:18px 20px;margin-bottom:14px;\">\n                    <div style=\"font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--terra);font-weight:600;margin-bottom:11px;\">Lo que sigues haciendo, una vez más<\u002Fdiv>\n                    <sc-for list=\"{{ recapUVM }}\" as=\"u\" hint-placeholder-count=\"3\">\n                      <div style=\"display:flex;gap:10px;align-items:flex-start;margin-bottom:7px;\"><span style=\"color:var(--terra);flex-shrink:0;\">↻<\u002Fspan><span style=\"font-size:.88rem;color:rgba(223,211,189,.82);font-weight:300;line-height:1.5;\">{{ u.text }}<\u002Fspan><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <p style=\"font-size:.84rem;color:rgba(223,211,189,.6);font-weight:300;line-height:1.6;margin:0 0 22px;max-width:560px;\">{{ recapClosing }}<\u002Fp>\n                <button onclick=\"{{ closeRecap }}\" style=\"padding:13px 24px;border:1px solid rgba(223,211,189,.32);border-radius:11px;background:transparent;color:var(--sand);font-weight:600;font-size:.92rem;cursor:pointer;\" style-hover=\"border-color:rgba(223,211,189,.6);\">← Volver a mi semana<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ====== VISTA DE SEMANA ====== -->\n          <sc-if value=\"{{ avShowWeek }}\" hint-placeholder-val=\"{{ true }}\">\n\n            <div style=\"display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:14px;\">\n              <span style=\"font-family:'Marcellus',serif;font-size:1.5rem;color:var(--ink);line-height:1.1;\">Semana {{ avViewNum }}<\u002Fspan>\n              <span style=\"font-size:.86rem;color:rgba(16,15,13,.5);font-weight:300;\">{{ avViewDate }}<\u002Fspan>\n              <span style=\"{{ avStateBadgeStyle }}\">{{ avViewStateLabel }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <!-- formulario editable -->\n            <sc-if value=\"{{ avEditable }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:#fff;border:1px solid var(--line);border-left:5px solid var(--terra);border-radius:14px;padding:24px;box-shadow:0 10px 26px rgba(104,48,30,.05);\">\n\n                <label style=\"display:block;font-size:.78rem;color:var(--cocoa);font-weight:600;margin-bottom:9px;\">¿Cómo te sentiste esta semana?<\u002Flabel>\n                <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:20px;\">\n                  <sc-for list=\"{{ animoChips }}\" as=\"a\" hint-placeholder-count=\"5\">\n                    <button onclick=\"{{ a.pick }}\" style=\"{{ a.style }}\"><span style=\"{{ a.dotStyle }}\"><\u002Fspan>{{ a.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n                  <div>\n                    <label style=\"display:block;font-size:.78rem;color:var(--cocoa);font-weight:500;margin-bottom:6px;\">✦ ¿Qué acción de tu 20% hiciste?<\u002Flabel>\n                    <textarea rows=\"2\" placeholder=\"La acción concreta que avanzaste…\" value=\"{{ draftAccion }}\" onchange=\"{{ onAccion }}\" style=\"width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:.88rem;background:var(--paper);outline:none;line-height:1.45;\"><\u002Ftextarea>\n                  <\u002Fdiv>\n                  <div>\n                    <label style=\"display:block;font-size:.78rem;color:var(--cocoa);font-weight:500;margin-bottom:6px;\">¿Qué exploraste o probaste?<\u002Flabel>\n                    <textarea rows=\"2\" placeholder=\"Algo nuevo que intentaste…\" value=\"{{ draftExploro }}\" onchange=\"{{ onExploro }}\" style=\"width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:.88rem;background:var(--paper);outline:none;line-height:1.45;\"><\u002Ftextarea>\n                  <\u002Fdiv>\n                  <div>\n                    <label style=\"display:block;font-size:.78rem;color:var(--cocoa);font-weight:500;margin-bottom:6px;\">¿Qué recursos usaste?<\u002Flabel>\n                    <input type=\"text\" placeholder=\"Tiempo, personas, herramientas…\" value=\"{{ draftRecursos }}\" onchange=\"{{ onRecursos }}\" style=\"width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:.88rem;background:var(--paper);outline:none;\">\n                  <\u002Fdiv>\n                  <div>\n                    <label style=\"display:block;font-size:.78rem;color:var(--cocoa);font-weight:500;margin-bottom:6px;\">¿Qué limitación encontraste?<\u002Flabel>\n                    <input type=\"text\" placeholder=\"Un freno o barrera de la semana…\" value=\"{{ draftLimit }}\" onchange=\"{{ onLimit }}\" style=\"width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:.88rem;background:var(--paper);outline:none;\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"margin-top:16px;\">\n                  <label style=\"display:block;font-size:.78rem;color:var(--cocoa);font-weight:500;margin-bottom:6px;\">🏆 Tu logro / win de la semana<\u002Flabel>\n                  <textarea rows=\"2\" placeholder=\"Por pequeño que parezca, cuéntalo…\" value=\"{{ draftLogro }}\" onchange=\"{{ onLogro }}\" style=\"width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:.88rem;background:var(--paper);outline:none;line-height:1.45;\"><\u002Ftextarea>\n                <\u002Fdiv>\n\n                <div style=\"margin-top:16px;background:#fbf3ee;border:1px solid rgba(142,68,31,.16);border-radius:12px;padding:14px 16px;\">\n                  <div style=\"display:flex;gap:9px;align-items:flex-start;margin-bottom:10px;\"><span style=\"color:var(--terra);font-size:1.05rem;line-height:1;\">↻<\u002Fspan><span style=\"font-size:.8rem;color:var(--cocoa);font-weight:300;line-height:1.5;\"><b style=\"font-weight:600;\">El poder de una vez más.<\u002Fb> Un intento más, una semana más. Eso te separa de quien quieres ser.<\u002Fspan><\u002Fdiv>\n                  <label style=\"display:block;font-size:.78rem;color:var(--cocoa);font-weight:500;margin-bottom:6px;\">¿Qué harás una vez más la próxima semana?<\u002Flabel>\n                  <textarea rows=\"2\" placeholder=\"Eso que vas a sostener o repetir…\" value=\"{{ draftSeguira }}\" onchange=\"{{ onSeguira }}\" style=\"width:100%;padding:11px 12px;border:1px solid rgba(142,68,31,.2);border-radius:10px;font-size:.88rem;background:#fff;outline:none;line-height:1.45;\"><\u002Ftextarea>\n                <\u002Fdiv>\n\n                <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:18px;\">\n                  <button onclick=\"{{ saveWeek }}\" style=\"padding:14px 28px;border:none;border-radius:12px;background:var(--cocoa);color:var(--paper);font-size:.96rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:9px;\" style-hover=\"filter:brightness(1.08);\">{{ saveWeekLabel }}<\u002Fbutton>\n                  <sc-if value=\"{{ segMsg }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ segMsgStyle }}\">{{ segMsg }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- solo lectura (semana pasada) -->\n            <sc-if value=\"{{ avReadonly }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#fbf8f4;border:1px solid var(--line);border-radius:14px;padding:24px;\">\n                <sc-if value=\"{{ avHasAnimo }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:inline-block;font-size:.72rem;letter-spacing:.04em;color:var(--paper);background:var(--terra);padding:4px 11px;border-radius:20px;font-weight:500;margin-bottom:16px;\">{{ roAnimo }}<\u002Fdiv><\u002Fsc-if>\n                <sc-for list=\"{{ roFields }}\" as=\"f\" hint-placeholder-count=\"3\">\n                  <div style=\"margin-bottom:14px;\">\n                    <div style=\"font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;color:var(--terra);font-weight:600;margin-bottom:4px;\">{{ f.label }}<\u002Fdiv>\n                    <div style=\"font-size:.92rem;color:var(--ink);font-weight:400;line-height:1.5;\">{{ f.value }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"font-size:.74rem;color:rgba(16,15,13,.4);font-weight:300;font-style:italic;margin-top:6px;\">Registro guardado · solo lectura<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- sin registro -->\n            <sc-if value=\"{{ avNoEntry }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#fbf8f4;border:1px dashed var(--line);border-radius:14px;padding:30px;text-align:center;\">\n                <div style=\"font-family:'Marcellus',serif;font-size:1.2rem;color:rgba(16,15,13,.5);margin-bottom:6px;\">Sin registro esta semana<\u002Fdiv>\n                <p style=\"font-size:.86rem;color:rgba(16,15,13,.45);font-weight:300;line-height:1.55;margin:0;\">No pasa nada. Cada semana es una nueva oportunidad de aparecer una vez más.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- futura bloqueada -->\n            <sc-if value=\"{{ avFuture }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"back \n      critical: [],\n      seguimiento: {},\n      plan3: {},\n      pack: this.packKeyFromLabel(props && props.messagePack) || \"plena\",\n      hora: (props && props.horaRecordatorio) || \"09:00\",\n      notice: \"\",\n      saveState: \"\",\n      segSave: \"\",\n      viewWeek: 0,\n      avanceMode: \"week\",\n      recapMonth: 1,\n      draft: { animo: \"\", accion: \"\", exploro: \"\", recursos: \"\", limitaciones: \"\", logro: \"\", seguira: \"\" },\n      autoStatus: \"\",\n      _tick: 0\n    };\n    this.DEMO = { usuario: \"demo\", codigo: \"FOCUS20\" };\n    this.packs = {\n      habito: { label: \"Hábito & Constancia\", desc: \"Construye el músculo de aparecer cada semana.\", weeks: [\n        { t: \"El primer paso\", a: \"Bloquea 1 hora esta semana solo para tu foco del 20%.\", c: \"Un hábito nace de aparecer, no de la perfección.\" },\n        { t: \"Mismo día, misma hora\", a: \"Repite tu bloque de enfoque el mismo día y hora que la semana pasada.\", c: \"Lo que se repite, se vuelve identidad.\" },\n        { t: \"Reduce la fricción\", a: \"Deja todo listo la noche anterior para empezar sin excusas.\", c: \"Hacerlo fácil es hacerlo posible.\" },\n        { t: \"Una sola cosa\", a: \"Elige UNA acción crítica y termínala antes de abrir otra.\", c: \"Terminar pesa más que empezar diez veces.\" },\n        { t: \"Mide tu racha\", a: \"Marca cada semana que cumpliste tu bloque de enfoque.\", c: \"Ver el avance alimenta las ganas.\" },\n        { t: \"Mitad del camino\", a: \"Revisa si tu 20% sigue siendo el correcto y ajústalo.\", c: \"Enfocarte también es soltar lo que ya no suma.\" },\n        { t: \"Protege tu energía\", a: \"Dile que no a una distracción que suele robarte el foco.\", c: \"Cada no enfocado es un sí a tu proyecto.\" },\n        { t: \"Celebra lo pequeño\", a: \"Reconoce un avance concreto de estas semanas.\", c: \"Celebrar sostiene el hábito.\" },\n        { t: \"Vuelve sin culpa\", a: \"Si fallaste una semana, retoma hoy sin reproches.\", c: \"La constancia no es no caer, es volver.\" },\n        { t: \"Comparte tu avance\", a: \"Cuéntale a alguien qué has logrado con tu foco.\", c: \"Lo dicho en voz alta se vuelve compromiso.\" },\n        { t: \"Afina el cierre\", a: \"Define qué falta para dar por terminada tu prioridad.\", c: \"Un final claro acerca el final real.\" },\n        { t: \"Cierra y agradece\", a: \"Cierra tu ciclo y anota qué cambió en ti.\", c: \"Terminar es el hábito que más te transforma.\" }\n      ]},\n      plena: { label: \"Atención Plena\", desc: \"Avanza desde la calma y la presencia.\", weeks: [\n        { t: \"Empieza presente\", a: \"Antes de tu bloque, respira tres veces y suelta el ruido.\", c: \"La calma es el primer acto de enfoque.\" },\n        { t: \"Una tarea, plena atención\", a: \"Trabaja tu 20% sin pestañas ni notificaciones abiertas.\", c: \"La atención dividida no transforma nada.\" },\n        { t: \"Escucha tu por qué\", a: \"Recuerda por qué este proyecto te importa de verdad.\", c: \"El propósito sostiene el foco.\" },\n        { t: \"Haz menos, mejor\", a: \"Quita una tarea de tu semana en vez de añadir otra.\", c: \"Menos, hecho con presencia, rinde más.\" },\n        { t: \"Observa sin juzgar\", a: \"Nota qué te distrae, sin pelearte contigo.\", c: \"Lo que observas con calma, lo puedes cambiar.\" },\n        { t: \"Pausa consciente\", a: \"A mitad del bloque, detente un minuto y vuelve al presente.\", c: \"El presente es donde ocurre el avance.\" },\n        { t: \"Suelta lo urgente\", a: \"Aplaza algo urgente pero no importante por tu prioridad real.\", c: \"No todo lo que apura merece tu atención.\" },\n        { t: \"Gratitud activa\", a: \"Agradece un recurso que ya tienes para avanzar.\", c: \"La gratitud abre claridad.\" },\n        { t: \"Regresa al centro\", a: \"Si te dispersaste, vuelve a tu única prioridad de hoy.\", c: \"Volver al centro también es avanzar.\" },\n        { t: \"Habita el proceso\", a: \"Disfruta el hacer, no solo el resultado.\", c: \"Lo que disfrutas, lo sostienes.\" },\n        { t: \"Claridad antes del cierre\", a: \"Define en una frase qué significa terminar esto.\", c: \"La claridad calma la mente.\" },\n        { t: \"Cierra en paz\", a: \"Cierra el ciclo y honra el camino recorrido.\", c: \"Terminar en plenitud es el verdadero logro.\" }\n      ]},\n      impulso: { label: \"Impulso & Logro\", desc: \"Momentum y resultados que celebras.\", weeks: [\n        { t: \"Arranca con fuerza\", a: \"Da el primer golpe a tu acción más importante hoy.\", c: \"El impulso nace del primer movimiento.\" },\n        { t: \"Gana momentum\", a: \"Encadena tu segundo avance antes de que se enfríe.\", c: \"El momentum se cuida, no se improvisa.\" },\n        { t: \"Apunta al resultado\", a: \"Define cómo se ve 'logrado' en tu prioridad.\", c: \"Una meta clara acelera el avance.\" },\n        { t: \"Acción de alto impacto\", a: \"Haz la tarea que más mueve la aguja, aunque incomode.\", c: \"El 20% incómodo trae el 80% del resultado.\" },\n        { t: \"Quita el freno\", a: \"Elimina un obstáculo concreto que te frena.\", c: \"Avanzar es también despejar el camino.\" },\n        { t: \"Chequeo de medio ciclo\", a: \"Mide cuánto avanzaste y ajusta tu apuesta.\", c: \"Lo que se mide, se logra.\" },\n        { t: \"Pide refuerzo\", a: \"Pide ayuda a alguien que te acerque a la meta.\", c: \"Pedir es estrategia, no debilidad.\" },\n        { t: \"Capitaliza tus logros\", a: \"Convierte un avance en el trampolín del siguiente.\", c: \"Cada logro es combustible.\" },\n        { t: \"Acelera el cierre\", a: \"Recorta lo que sobra y ve directo a terminar.\", c: \"Terminar es tu mayor ventaja.\" },\n        { t: \"Muestra resultados\", a: \"Comparte un resultado tangible de tu enfoque.\", c: \"Mostrar tu avance multiplica tu impulso.\" },\n        { t: \"Último empujón\", a: \"Lista lo que falta y agéndalo esta semana.\", c: \"El cierre se planea, no se espera.\" },\n        { t: \"Logro cumplido\", a: \"Cierra tu prioridad y reconoce tu logro.\", c: \"Terminar lo importante es ganar.\" }\n      ]}\n    };\n  }\n\n  packKeyFromLabel(label) {\n    if (!label) return null;\n    const m = { \"Hábito & Constancia\": \"habito\", \"Atención Plena\": \"plena\", \"Impulso & Logro\": \"impulso\" };\n    return m[label] || null;\n  }\n\n  componentDidMount() {\n    this._applyAccent();\n    try { document.documentElement.lang = \"es\"; } catch (e) {}\n    if (!window.HFDB) window.addEventListener(\"hfdb-ready\", () => this.forceUpdate(), { once: true });\n    try {\n      window.addEventListener(\"visibilitychange\", () => { if (document.visibilityState === \"hidden\") this._saveNow(); });\n      window.addEventListener(\"pagehide\", () => { try { this._saveLocal(); } catch (e) {} });\n    } catch (e) {}\n    this._autoResume();\n  }\n\n  /* ---------- persistencia local + sesión ---------- */\n  _planKey(u) { return \"hf_plan_\" + (u || \"anon\"); }\n  _loadLocal(u) { try { return JSON.parse(localStorage.getItem(this._planKey(u)) || \"null\"); } catch (e) { return null; } }\n  _saveLocal() {\n    try {\n      const u = this.state.access ? this.state.access.usuario : \"\";\n      if (!u) return;\n      localStorage.setItem(this._planKey(u), JSON.stringify(this.planData()));\n    } catch (e) {}\n  }\n  _saveSession(s) { try { localStorage.setItem(\"hf_session\", JSON.stringify(s)); } catch (e) {} }\n  _clearSession() { try { localStorage.removeItem(\"hf_session\"); } catch (e) {} }\n  _whenDB() {\n    return new Promise((res) => {\n      if (window.HFDB) return res();\n      let done = false; const cb = () => { if (done) return; done = true; res(); };\n      window.addEventListener(\"hfdb-ready\", cb, { once: true });\n      setTimeout(cb, 6000);\n    });\n  }\n  _newer(a, b) {\n    if (!a) return b || null; if (!b) return a;\n    const ta = Date.parse(a.actualizado || 0) || 0, tb = Date.parse(b.actualizado || 0) || 0;\n    return tb > ta ? b : a;\n  }\n  _applyPlan(next,
